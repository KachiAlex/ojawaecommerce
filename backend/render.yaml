services:
  - type: web
    name: ojawaecommerce
    env: node
    plan: starter
    branch: main
    repo: https://github.com/ojawaecommerce/ojawa
    buildCommand: "npm install"
    startCommand: "node server.js"
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8080
      - key: FIREBASE_PROJECT_ID
      - key: FIREBASE_CLIENT_EMAIL
      - key: FIREBASE_PRIVATE_KEY
      - key: FIREBASE_DATABASE_URL
      - key: FIREBASE_API_KEY
      - key: ALLOWED_ORIGINS
        value: https://ojawa.africa,https://www.ojawa.africa,https://ojawa-ecommerce.web.app,https://ojawa-ecommerce-staging.web.app,http://localhost:3000,http://localhost:5173
      - key: JWT_SECRET
      - key: RATE_LIMIT_WINDOW_MS
        value: 900000
      - key: RATE_LIMIT_MAX_REQUESTS
        value: 100
